<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>随机图 API</title>
  <link rel="stylesheet" href="/public/common.css">
</head>
<body>

<div class="topbar-actions">
  <button id="refreshBtn">刷新背景</button>
  <button onclick="location.href='/public/login.html'">登录 / 上传</button>
  <button onclick="location.href='/public/admin.html'">标签管理</button>
</div>

<div class="container home-container">
  <h1>✨ One Picture API</h1>

  <div class="home-grid">
    <section class="section endpoint-card">
      <h2>跳转接口</h2>
      <a class="endpoint-link" href="/api/web" target="_blank">/api/web<span>随机 PC 图片（302）</span></a>
      <a class="endpoint-link" href="/api/web?tag=anime" target="_blank">/api/web?tag=anime<span>按标签随机 PC 图（302）</span></a>
      <a class="endpoint-link" href="/api/m" target="_blank">/api/m<span>随机手机图片（302）</span></a>
      <a class="endpoint-link" href="/api/m?tag=anime" target="_blank">/api/m?tag=anime<span>按标签随机手机图（302）</span></a>
    </section>

    <section class="section endpoint-card">
      <h2>JSON 接口</h2>
      <a class="endpoint-link" href="/api/web/json" target="_blank">/api/web/json<span>返回静态图片 URL</span></a>
      <a class="endpoint-link" href="/api/web/json?tag=anime" target="_blank">/api/web/json?tag=anime<span>按标签返回 PC 图 URL</span></a>
      <a class="endpoint-link" href="/api/m/json" target="_blank">/api/m/json<span>返回静态图片 URL</span></a>
      <a class="endpoint-link" href="/api/m/json?tag=anime" target="_blank">/api/m/json?tag=anime<span>按标签返回手机图 URL</span></a>
    </section>

    <section class="section stats home-stats">
      <div class="stats-head">
        <h2>使用统计</h2>
        <div id="timeDisplay">北京时间：--:--:--</div>
      </div>
      <table>
        <thead>
          <tr><th>接口</th><th>今日调用</th><th>总调用</th></tr>
        </thead>
        <tbody id="statsBody"></tbody>
      </table>
    </section>
  </div>
</div>

<script src="/public/common.js"></script>
<script>
const body = document.body;
const refreshBtn = document.getElementById('refreshBtn');
const apiPath = window.AppCommon.detectApiPath();

function refreshBackground() {
  window.AppCommon.refreshBackground(body, apiPath);
}
refreshBackground();
refreshBtn.addEventListener('click', refreshBackground);

const keyMap = {
  "redirect_web": "/api/web",
  "redirect_m": "/api/m",
  "json_web": "/api/web/json",
  "json_m": "/api/m/json",
  "upload": "/api/upload"
};

async function loadStats() {
  const res = await fetch('/api/stats?t=' + Date.now());
  if (!res.ok) {
    throw new Error('HTTP ' + res.status);
  }
  const data = await res.json();
  const tbody = document.getElementById('statsBody');

  const rows = Object.keys(data).map((key) => {
    const path = keyMap[key] || key;
    return `<tr>
      <td>${path}</td>
      <td>${data[key].today}</td>
      <td>${data[key].total}</td>
    </tr>`;
  }).join('');

  tbody.innerHTML = rows;
}

let statsTimer = null;
let statsIntervalMs = 10000;

function scheduleStats(nextMs = statsIntervalMs) {
  if (statsTimer) {
    clearTimeout(statsTimer);
  }
  statsTimer = setTimeout(async () => {
    if (document.hidden) {
      scheduleStats(30000);
      return;
    }
    try {
      await loadStats();
      statsIntervalMs = 10000;
      scheduleStats(statsIntervalMs);
    } catch {
      statsIntervalMs = Math.min(statsIntervalMs * 2, 60000);
      scheduleStats(statsIntervalMs);
    }
  }, nextMs);
}

loadStats().catch(() => {});
scheduleStats(10000);

document.addEventListener('visibilitychange', () => {
  if (!document.hidden) {
    loadStats().catch(() => {});
    scheduleStats(10000);
  }
});

function updateBeijingTime() {
  const now = new Date();
  const utc = now.getTime() + (now.getTimezoneOffset() * 60000);
  const beijing = new Date(utc + 8 * 3600000);
  const h = String(beijing.getHours()).padStart(2, '0');
  const m = String(beijing.getMinutes()).padStart(2, '0');
  const s = String(beijing.getSeconds()).padStart(2, '0');
  document.getElementById('timeDisplay').textContent = `北京时间：${h}:${m}:${s}`;
}
updateBeijingTime();
setInterval(updateBeijingTime, 1000);
</script>

</body>
</html>
